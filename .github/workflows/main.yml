name: Deploy to Railway

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies (Flask)
      - name: Install Flask
        run: pip install flask

      # 4. Make the ultra binary executable
      - name: Set binary permissions
        run: chmod +x ultra

      # 5. Verify binary is ready
      - name: Verify binary
        run: |
          ls -la ultra
          file ultra || true

      # 6. (Optional) Run a quick test to ensure Flask imports
      - name: Test Flask import
        run: python -c "import flask; print('Flask OK')"

      # 7. Install Railway CLI
      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      # 8. Deploy to Railway (using token from GitHub Secrets)
      - name: Deploy to Railway
        run: railway up --service=${{ secrets.RAILWAY_SERVICE_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
